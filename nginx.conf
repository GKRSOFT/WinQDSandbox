server {

    listen 8006 default_server;

    autoindex on;
    tcp_nodelay on;
    server_tokens off;
    absolute_redirect off;

    error_log /dev/null;
    access_log /dev/null;

    auth_basic off;
    auth_basic_user_file /etc/nginx/.htpasswd;

    include /etc/nginx/mime.types;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 500;
    gzip_disable "msie6";
    gzip_types text/css text/javascript text/xml text/plain text/x-component application/javascript application/json application/xml application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    add_header Cache-Control "no-cache";

    location / {

      root /run/shm;

      if ( -f /run/shm/index.html) {
        break;
      }

      try_files /index.html @vnc;
    }
    
	location /info {
      proxy_pass http://127.0.0.1:8000/;
    }
        
	location /status2 {
      proxy_pass http://127.0.0.1:8000/status;
    }
        
	location /mutex {
      proxy_pass http://127.0.0.1:8000/mutex;
    }
        
	location /logs {
      proxy_pass http://127.0.0.1:8000/logs;
    }
        
	location /system {
      proxy_pass http://127.0.0.1:8000/system;
    }
        
	location /environ {
      proxy_pass http://127.0.0.1:8000/environ;
    }
        
	location /path {
      proxy_pass http://127.0.0.1:8000/path;
    }
        
	location /mkdir {
      proxy_pass http://127.0.0.1:8000/mkdir;
    }
        
	location /mktemp {
      proxy_pass http://127.0.0.1:8000/mktemp;
    }
        
	location /store {
      proxy_pass http://127.0.0.1:8000/store;
    }
        
                  
    location /retrieve {
      proxy_pass http://127.0.0.1:8000/retrieve;
    }

    location /extract {
      proxy_pass http://127.0.0.1:8000/extract;
    }
    
    location /remove {
      proxy_pass http://127.0.0.1:8000/remove;
    }
    
    location /execute {
      proxy_pass http://127.0.0.1:8000/execute;
    }
    
    location /execpy {
      proxy_pass http://127.0.0.1:8000/execpy;
    }
    
    location /browser_extension {
      proxy_pass http://127.0.0.1:8000/browser_extension;
    }
    
    location /pinning {
      proxy_pass http://127.0.0.1:8000/pinning;
    }
    
    location /kill {
      proxy_pass http://127.0.0.1:8000/kill;
    }
    
     location /ps {
      proxy_pass http://127.0.0.1:8090/ps;
    }
       
    location /startVM {
      proxy_pass http://127.0.0.1:8090/startVM;
    }
    
    location /killVM {
      proxy_pass http://127.0.0.1:8090/killVM;
    }    
    
    location /revertVM {
      proxy_pass http://127.0.0.1:8090/revertVM;
    }    
    
    location @vnc {

      root /usr/share/novnc;
      index vnc.html;

    }

    location /status {

      proxy_http_version 1.1;

      proxy_set_header Connection 'upgrade';
      proxy_set_header Upgrade $http_upgrade;

      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      proxy_pass http://127.0.0.1:8004/;
    }

    location /websockify {

      proxy_http_version 1.1;

      proxy_set_header Connection 'upgrade';
      proxy_set_header Upgrade $http_upgrade;

      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;

      proxy_pass http://127.0.0.1:5700/;
    }

}
